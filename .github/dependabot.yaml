version: 2
updates:
  - package-ecosystem: "deno"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
  - package-ecosystem: "nix"
    directories:
      - "/"
      - "/nix/agent-skills"
      - "/nix/dpp"
    schedule:
      interval: "weekly"
    groups:
      flake-inputs:
        patterns:
          - "*"
